<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#243447"/>
  <rect x="40" y="36" width="1200" height="648" rx="12" fill="#f1d9aa" stroke="#3b2a1f" stroke-width="6"/>
  <text x="640" y="88" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#3b2a1f">首个研发竖切目标</text>
  <text x="640" y="124" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#5b3928">最小可玩闭环：从新游戏到一次干预结算</text>

  <defs>
    <marker id="arrowMvp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b2a1f"/>
    </marker>
  </defs>

  <g font-family="sans-serif">
    <rect x="92" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="172" y="224" text-anchor="middle" font-size="20" fill="#3b2a1f">主菜单</text>

    <rect x="282" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="362" y="224" text-anchor="middle" font-size="20" fill="#3b2a1f">新游戏</text>

    <rect x="472" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="552" y="212" text-anchor="middle" font-size="20" fill="#3b2a1f">主地图</text>
    <text x="552" y="236" text-anchor="middle" font-size="14" fill="#5b3928">时间 / 资源 / 地点</text>

    <rect x="662" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="742" y="212" text-anchor="middle" font-size="20" fill="#3b2a1f">查看 NPC</text>
    <text x="742" y="236" text-anchor="middle" font-size="14" fill="#5b3928">3 名核心角色</text>

    <rect x="852" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="932" y="212" text-anchor="middle" font-size="20" fill="#3b2a1f">触发事件</text>
    <text x="932" y="236" text-anchor="middle" font-size="14" fill="#5b3928">1 个关键事件</text>

    <rect x="1042" y="180" width="160" height="72" rx="8" fill="#d5b17a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="1122" y="212" text-anchor="middle" font-size="20" fill="#3b2a1f">神力干预</text>
    <text x="1122" y="236" text-anchor="middle" font-size="14" fill="#5b3928">托梦 / 赐福</text>

    <line x1="252" y1="216" x2="278" y2="216" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="442" y1="216" x2="468" y2="216" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="632" y1="216" x2="658" y2="216" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="822" y1="216" x2="848" y2="216" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="1012" y1="216" x2="1038" y2="216" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>

    <rect x="180" y="362" width="220" height="74" rx="8" fill="#d08a4a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="290" y="392" text-anchor="middle" font-size="20" fill="#3b2a1f">推动时间</text>
    <text x="290" y="418" text-anchor="middle" font-size="14" fill="#3b2a1f">进入下一时段</text>

    <rect x="530" y="362" width="220" height="74" rx="8" fill="#d08a4a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="640" y="392" text-anchor="middle" font-size="20" fill="#3b2a1f">显示结算</text>
    <text x="640" y="418" text-anchor="middle" font-size="14" fill="#3b2a1f">资源 / NPC / 历史</text>

    <rect x="880" y="362" width="220" height="74" rx="8" fill="#d08a4a" stroke="#3b2a1f" stroke-width="4"/>
    <text x="990" y="392" text-anchor="middle" font-size="20" fill="#3b2a1f">返回主地图</text>
    <text x="990" y="418" text-anchor="middle" font-size="14" fill="#3b2a1f">闭环完成</text>

    <path d="M1122 252 C1122 320 290 310 290 358" fill="none" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="400" y1="399" x2="526" y2="399" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>
    <line x1="750" y1="399" x2="876" y2="399" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowMvp)"/>

    <rect x="164" y="548" width="952" height="62" rx="10" fill="#8a5a32" stroke="#3b2a1f" stroke-width="5"/>
    <text x="640" y="585" text-anchor="middle" font-size="19" fill="#fff1cf">竖切完成标准：玩家完成一次“观察 → 干预 → 推进 → 结算”的可玩闭环</text>
  </g>
</svg>