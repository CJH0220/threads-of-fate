<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#243447"/>
  <rect x="40" y="36" width="1200" height="648" rx="12" fill="#f1d9aa" stroke="#3b2a1f" stroke-width="6"/>
  <text x="640" y="88" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#3b2a1f">最终路线判定图</text>
  <text x="640" y="124" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#5b3928">Day 60 晚：资源、事件和角色结局汇总为最终路线</text>

  <defs>
    <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b2a1f"/>
    </marker>
  </defs>

  <g font-family="sans-serif">
    <rect x="500" y="160" width="280" height="72" rx="10" fill="#d5b17a" stroke="#3b2a1f" stroke-width="5"/>
    <text x="640" y="204" text-anchor="middle" font-size="22" fill="#3b2a1f">Day 60 最终判定</text>

    <rect x="94" y="300" width="200" height="92" rx="10" fill="#55515a" stroke="#2a2528" stroke-width="5"/>
    <text x="194" y="337" text-anchor="middle" font-size="22" fill="#fff1cf">失败</text>
    <text x="194" y="365" text-anchor="middle" font-size="14" fill="#fff1cf">香火 &lt; 100</text>
    <text x="194" y="384" text-anchor="middle" font-size="14" fill="#fff1cf">或强硬不幸结局</text>

    <rect x="326" y="300" width="200" height="92" rx="10" fill="#f1d05a" stroke="#3b2a1f" stroke-width="5"/>
    <text x="426" y="337" text-anchor="middle" font-size="22" fill="#3b2a1f">正神</text>
    <text x="426" y="365" text-anchor="middle" font-size="14" fill="#3b2a1f">香火 ≥ 100</text>
    <text x="426" y="384" text-anchor="middle" font-size="14" fill="#3b2a1f">阳德明显更高</text>

    <rect x="558" y="300" width="200" height="92" rx="10" fill="#7b2e2e" stroke="#3b1111" stroke-width="5"/>
    <text x="658" y="337" text-anchor="middle" font-size="22" fill="#ffe6c7">邪神</text>
    <text x="658" y="365" text-anchor="middle" font-size="14" fill="#ffe6c7">香火 ≥ 100</text>
    <text x="658" y="384" text-anchor="middle" font-size="14" fill="#ffe6c7">阴德明显更高</text>

    <rect x="790" y="300" width="200" height="92" rx="10" fill="#b8a887" stroke="#3b2a1f" stroke-width="5"/>
    <text x="890" y="337" text-anchor="middle" font-size="22" fill="#3b2a1f">中性</text>
    <text x="890" y="365" text-anchor="middle" font-size="14" fill="#3b2a1f">香火 ≥ 100</text>
    <text x="890" y="384" text-anchor="middle" font-size="14" fill="#3b2a1f">阳德阴德接近</text>

    <rect x="1022" y="300" width="200" height="92" rx="10" fill="#d6a84f" stroke="#5d2d70" stroke-width="5"/>
    <text x="1122" y="337" text-anchor="middle" font-size="22" fill="#3b2a1f">传奇</text>
    <text x="1122" y="365" text-anchor="middle" font-size="14" fill="#3b2a1f">香火 ≥ 150</text>
    <text x="1122" y="384" text-anchor="middle" font-size="14" fill="#3b2a1f">多名 NPC 好结局</text>

    <line x1="640" y1="232" x2="194" y2="296" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowEnd)"/>
    <line x1="640" y1="232" x2="426" y2="296" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowEnd)"/>
    <line x1="640" y1="232" x2="658" y2="296" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowEnd)"/>
    <line x1="640" y1="232" x2="890" y2="296" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowEnd)"/>
    <line x1="640" y1="232" x2="1122" y2="296" stroke="#3b2a1f" stroke-width="3" marker-end="url(#arrowEnd)"/>

    <rect x="176" y="500" width="928" height="64" rx="10" fill="#8a5a32" stroke="#3b2a1f" stroke-width="5"/>
    <text x="640" y="539" text-anchor="middle" font-size="20" fill="#fff1cf">判定优先级：强硬失败 → 香火失败 → 传奇 → 邪神 → 正神 → 中性</text>
  </g>
</svg>